# 本脚本由 AI 针对 Ubuntu 24.04 (2026环境) 深度优化
# 修复了高版本 GCC 与 Python 3.12 在编译旧固件时的兼容性问题

name: coolede-25-U24-x86_x64

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: '开启 SSH 调试'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: 25feeds.conf.default
  CONFIG_FILE: .config25
  DIY_P1_SH: 25diy-part1.sh
  DIY_P2_SH: 25diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs: 
  build:
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: write

    steps:
    - name: 检查项目源码
      uses: actions/checkout@v5

    - name: 检查点 1：清理前磁盘状态
      run: |
        echo "=== 系统初始磁盘状态 ==="
        df -hT
        echo "========================"

    - name: 初始化环境与极致清理
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 移除大规模预装软件包（约释放 30GB+）
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules /opt/hostedtoolcache/CodeQL
        docker rmi $(docker images -q) 2>/dev/null || true
        
        # 系统深度清理
        sudo -E apt-get -qq update
        sudo -E apt-get -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* snap*
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz genisoimage msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools libpython3-dev python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 检查点 2：清理后磁盘状态
      run: |
        echo "=== 环境清理后磁盘状态 ==="
        df -hT
        echo "========================"

    - name: 构建 LVM 虚拟磁盘 (合并可用空间)
      run: |
        mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
        root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
        sudo truncate -s "${mnt_size}"G /mnt/mnt.img
        sudo truncate -s "${root_size}"G /root.img
        sudo losetup /dev/loop6 /mnt/mnt.img
        sudo losetup /dev/loop7 /root.img
        sudo pvcreate /dev/loop6 /dev/loop7
        sudo vgcreate github /dev/loop6 /dev/loop7
        sudo lvcreate -n runner -l 100%FREE github
        sudo mkfs.xfs /dev/github/runner
        sudo mount /dev/github/runner /workdir
        sudo chown -R $USER:$GROUPS /workdir

    - name: 检查点 3：虚拟磁盘挂载后状态
      run: |
        echo "=== 扩容后磁盘状态（重点查看 /workdir） ==="
        df -hT /workdir
        echo "=========================================="

    - name: 下载 OpenWrt 源码
      working-directory: /workdir
      run: |
        git clone --depth 1 ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载自定义 Feeds (DIY-P1)
      run: |
        [ -e ${{ env.FEEDS_CONF }} ] && mv ${{ env.FEEDS_CONF }} openwrt/feeds.conf.default
        chmod +x ${{ env.DIY_P1_SH }}
        cd openwrt
        $GITHUB_WORKSPACE/${{ env.DIY_P1_SH }}

    - name: 更新 Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a

    - name: 克隆官方 Luci 倉庫 (引入 SSHTunnel 并修复 OpenSSH 冲突)
      run: |
        # 1. 克隆官方 Luci 倉庫
        git clone --depth=1 https://github.com/openwrt/luci tmp_luci
        git clone --depth=1 https://github.com/openwrt/packages tmp_packages
        # 2. 確保目標目錄存在（feeds/luci 路徑是在 openwrt 根目錄下）
        # 注意：如果 feeds 裡沒有這個目錄，說明 update 沒成功或該類別不存在
        #mkdir -p openwrt/feeds/luci/applications/luci-app-sshtunnel
        # 3. 拷貝插件代碼
        cp -rf tmp_luci/applications/luci-app-sshtunnel/* openwrt/feeds/luci/applications/luci-app-sshtunnel/
        cp -rf tmp_packages/net/pppossh openwrt/feeds/packages/net/
        cp -rf tmp_packages/net/xray-core openwrt/feeds/packages/net/
        cp -rf tmp_packages/net/v2ray-core openwrt/feeds/packages/net/
        cp -rf tmp_packages/net/v2ray-geodata openwrt/feeds/packages/net/
        cp -rf tmp_packages/net/v2raya openwrt/feeds/packages/net/
        # 4. 清理臨時倉庫
        rm -rf tmp_luci
        rm -rf tmp_packages

    - name: 安装 Feeds
      run: |
        cd openwrt
        ./scripts/feeds install -a

    - name: 加载自定义配置 (DIY-P2)
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e ${{ env.CONFIG_FILE }} ] && mv ${{ env.CONFIG_FILE }} openwrt/.config
        chmod +x ${{ env.DIY_P2_SH }}
        cd openwrt
        $GITHUB_WORKSPACE/${{ env.DIY_P2_SH }}
        make defconfig

    - name: 预下载软件包 (Download)
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "DURATION=$(( ($(date +%s) - START_TIME) / 60 ))" >> $GITHUB_ENV

    - name: 整理文件与编译后清理
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt
        # 清理 build_dir 腾出空间给打包步骤（此操作可释放 10GB-20GB）
        rm -rf build_dir/target-* build_dir/toolchain-*
        cd bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 检查点 4：编译产物整理后状态
      run: |
        echo "=== 最终打包前磁盘状态 ==="
        df -hT
        echo "========================"

    - name: 上传固件至 Artifacts
      uses: actions/upload-artifact@v7
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 发布至 Release
      uses: softprops/action-gh-release@v2
      if: env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success' && !cancelled()
      with:
        tag_name: ${{ env.FILE_DATE }}
        body: |
          🚀 OpenWrt ARM 优化版发布
          ⏱️ 编译耗时：${{ env.DURATION }} 分钟
          📂 源码：${{ env.REPO_URL }}
        files: ${{ env.FIRMWARE }}/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 清理历史 Workflow
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 1
        keep_minimum_runs: 3

#    - name: 清理旧 Release
#      uses: dev-drprasad/delete-older-releases@v0.3.4
#      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
#      with:
#        keep_latest: 3
#        delete_tags: true
#      env:
#        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: 删除旧 Tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        gh release list --limit 100 --json tagName \
        | jq -r '.[]?.tagName' | tail -n +4 | xargs -r -n1 gh release delete --yes
      env:
       GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

#    - name: 清理旧 Release
#      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
#      uses: Nats-ji/delete-old-releases@v1          # ← 使用专门的 Delete‑Old‑Releases Action
#      with:
#      token: ${{ secrets.GITHUB_TOKEN }}           # 必须的访问令牌
#      keep-count: 3                               # 保留最新的 3 个 Release
##    remove-tags: true                           # 同时删除这些 Release 的 Git tag
